<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Playing Cards</title>
  </head>
  <body>
    <main id="playing-cards">
      <div class="card spades black">
        <div class="left">
          <span>A</span>
          <span>&spades;</span>
        </div>
        <div class="middle">
          <span>&spades;</span>
        </div>
        <div class="right">
          <span>A</span>
          <span>&spades;</span>
        </div>
      </div>

      <div class="card clubs black">
        <div class="left">
          <span>K</span>
          <span>&clubs;</span>
        </div>
        <div class="middle">
          <span>&clubs;</span>
        </div>
        <div class="right">
          <span>K</span>
          <span>&clubs;</span>
        </div>
      </div>

      <div class="card hearts red">
        <div class="left">
          <span>Q</span>
          <span>&hearts;</span>
        </div>
        <div class="middle">
          <span>&hearts;</span>
        </div>
        <div class="right">
          <span>Q</span>
          <span>&hearts;</span>
        </div>
      </div>

      <div class="card diamonds red">
        <div class="left">
          <span>J</span>
          <span>&diams;</span>
        </div>
        <div class="middle">
          <span>&diams;</span>
        </div>
        <div class="right">
          <span>J</span>
          <span>&diams;</span>
        </div>
      </div>

      <div class="card clubs black">
        <div class="left">
          <span>10</span>
          <span>&clubs;</span>
        </div>
        <div class="middle">
          <span>&clubs;</span>
        </div>
      <div class="right">
        <span>10</span>
        <span>&clubs;</span>
      </div>
      </div>
    </main>
  </body>
</html>
